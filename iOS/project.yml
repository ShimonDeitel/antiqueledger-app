name: AntiqueLedger
options:
  bundleIdPrefix: com.shimondeitel.antiqueledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AntiqueLedger:
    type: application
    platform: iOS
    sources:
      - path: AntiqueLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.antiqueledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AntiqueLedger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AntiqueLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AntiqueLedgerTests
    dependencies:
      - target: AntiqueLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.antiqueledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AntiqueLedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AntiqueLedgerUITests
    dependencies:
      - target: AntiqueLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.antiqueledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  AntiqueLedger:
    build:
      targets:
        AntiqueLedger: all
        AntiqueLedgerTests: [test]
        AntiqueLedgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AntiqueLedger.storekit
    test:
      config: Debug
      storeKitConfiguration: AntiqueLedger.storekit
      targets:
        - AntiqueLedgerTests
        - AntiqueLedgerUITests
    archive:
      config: Release
